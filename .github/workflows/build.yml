name: Build and Control Cambios

on:
  push:
    branches: [main]

jobs:
  generate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Instalar dependencias Node
        run: npm install || true
      - name: Generar Control de Cambios
        run: node scripts/generate-control-cambios.js || true
      - name: Build SPA
        run: npm run build
      # Aquí puedes agregar el deploy a Pages
